schema: 2
game: Path of Exile
version: Leveling Guide
author: exile-leveling (heartofphos) + poe-leveling.com
source: https://heartofphos.github.io/exile-leveling/
chapter: 6
title: 'Act 6: Twilight Strand to the Brine King'
next: act7.yaml
sections:
  - title: Twilight Strand to the Brine King
    steps:
      - id: 1
        title: Kill Everything
        description: |-
          - Get to **Lioneye's Watch**
          - Get to **The Twilight Strand**
          - Kill **Everything**
          - log out
          - Hand in *Fallen from Grace*
      - id: 2
        title: Kill The Dishonoured Queen
        description: |-
          - Get to **The Coast**
          - Get to **The Mud Flats**
          - Find and kill **The Dishonoured Queen**, take *Eye of Conquest*
        hints:
          - up-right corner of area, normally by a house
      - id: 3
        title: Kill Tukohama, Karui God of War
        description: |-
          - Get to **The Karui Fortress**
          - Get to **Tukohama's Keep**, kill **Tukohama, Karui God of War**
          - Get Crafting recipe
          - Get to **The Ridge**
        hints:
          - Go up to find **Tukohama, Karui God of War**
      - id: 4
        title: Get to The Lower Prison
        description: Get to **The Lower Prison**
      - branch:
          persistKey: league_start
          title: League start? (fresh league — underleveled, no twink gear)
          options:
            - label: League start
              steps:
                - id: 5
                  title: Trial
                  description: Complete Trial
            - label: Twinked / later
              steps:
                - id: 6
                  title: Skip — overleveled / twinked, no detour needed
      - id: 7
        title: Kill Reassembled Brutus
        description: |-
          - Get Crafting recipe
          - Get to **Shavronne's Tower**
          - Get to **Prison Rooftop**, kill **Shavronne the Returned** & **Reassembled Brutus**
          - Get to **The Warden's Chambers**
          - Get Crafting recipe
          - Get to **Prisoner's Gate**
      - id: 8
        title: Get to The Riverways
        description: |-
          - Get to **The Western Forest**
          - Get Crafting recipe
          - Get to **The Riverways**
          - Get Waypoint
        hints:
          - Follow the road
          - Look for the torch touching the road
          - Follow the trail in the direction of the torch
      - id: 9
        title: Kill Ryslatha, the Puppet Mistress
        description: |-
          - Get to **The Wetlands**
          - Get to **The Spawning Ground**, kill **Ryslatha, the Puppet Mistress**
          - log out
          - Hand in *The Father of War*
          - Hand in *Essence of Umbra*
          - Hand in *The Puppet Mistress*
        hints:
          - Look for 2 pillars near Waypoint, follow the trail
          - Go up-left
      - id: 10
        title: Get to The Cavern of Anger
        description: |-
          - Waypoint to **The Riverways**
          - Get to **The Southern Forest**
          - Get to **The Cavern of Anger**
          - Take *The Black Flag*
        hints:
          - Follow the road until it ends
          - Go down-right
      - id: 11
        title: Kill Tsoagoth, The Brine King
        description: |-
          - Get to **The Beacon**
          - Get Crafting recipe
          - Complete *Pillar Push*
          - Light the *Beacon*, throw in *The Black Flag*
          - Talk to Weylam Roth, sail to **The Brine King's Reef**
          - Get to **The Bring King's Throne**, kill **Tsoagoth, The Brine King**
          - log out
        hints:
          - Follow the shore to find **Tsoagoth, The Brine King**
      - id: 12
        title: Select Pantheons
        description: Select Pantheons
