        title: Get to The Chamber of Sins Level 2
        description: |-
          - Get to **The Chamber of Sins Level 1**
          - Get to **The Chamber of Sins Level 2**
        hints:
          - Go up-left
          - Go in same direction as Waypoint
      - branch:
          persistKey: league_start
          title: League start? (fresh league — underleveled, no twink gear)
