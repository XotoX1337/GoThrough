        hints:
          - Go down-left
      - id: 17
        title: 'Hand in: The Master of a Million Faces'
        description: |-
          - Get to **The Northern Forest**
          - Waypoint to **The Bridge Encampment**
          - Hand in *The Master of a Million Faces*
      - id: 18
        title: Kill Abberath, the Cloven One
        description: |-
          - Waypoint to **Prisoner's Gate**
          - Get to **Valley of the Fire Drinker**, kill **Abberath, the Cloven One**
          - take Portal
          - Hand in *The Cloven One*
        hints:
          - Go down the ledge next to the road
      - id: 19
        title: Get to The Vaal City
        description: |-
