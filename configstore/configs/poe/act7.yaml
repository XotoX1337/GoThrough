        description: |-
          - Find Sarcophagus to next floor
          - Find and take *Maligaro's Map*
          - log out
      - id: 9
        title: Kill Maligaro, the Artist
        description: |-
          - Waypoint to **The Crossroads**
          - Get to **The Chamber of Sins Level 1**
          - Get Crafting recipe
          - Get Waypoint
          - Activate *Map Device* with *Maligaro's Map*
          - Get to **Maligaro's Sanctum**
          - Get to **Maligaro's Workshop**, kill **Maligaro, the Artist**, take *Black Venom*
          - log out
          - Hand in *Essence of the Artist*
        hints:
          - Go up-left to find **Maligaro, the Artist**
          - Follow edges of the zone and cross bridges in the corners
          - Typically bridges spawn in the opposite diagonal corners
