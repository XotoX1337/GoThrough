          - Get to **The Causeway**
          - Get Crafting recipe
          - Find and take *Kishara's Star*
          - Get to **The Vaal City**
          - Find Waypoint
          - Waypoint to **The Northern Forest**
      - id: 20
        title: Kill Gruthkul, Mother of Despair
        description: |-
          - Get to **The Dread Thicket**
          - Find and take 7x*Firefly*
          - Get Crafting recipe
          - Get to **Den of Despair**, kill **Gruthkul, Mother of Despair**
          - take Portal
          - Hand in *Queen of Despair*
          - Hand in *Kishara's Star*
      - id: 21
        title: 'Hand in: Lighting the Way'
        description: |-
          - Waypoint to **Aspirants' Plaza**
          - Labyrinth (cruel)
          - Get Crafting recipe
          - Waypoint to **The Vaal City**
          - Hand in *Lighting the Way*
