<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- TODO(v0.3): self-host these as embedded .woff2 — Google Fonts CDN won't
         reliably load over a fullscreen game without guaranteed internet. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Hanken Grotesk', system-ui, sans-serif;
            background: transparent; /* real overlay: the game shows through */
            color: #e8e9ec;
            overflow: hidden;
            user-select: none;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* --- Mover: the draggable/resizable wrapper around the panel -------- */
        .mover {
            position: absolute;
            border-radius: 13px;
            outline-offset: 3px;
            transition: outline 0.2s ease;
        }
        .mover.editing { outline: 1px dashed rgba(255, 255, 255, 0.35); }
        .mover.dragging { transition: none; }

        /* --- Panel: the frostglass container ------------------------------- */
        .panel {
            width: 100%;
            border-radius: 12px;
            padding: 13px;
            background: rgba(15, 17, 21, 0.6);
            backdrop-filter: blur(18px) saturate(125%);
            -webkit-backdrop-filter: blur(18px) saturate(125%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 34px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        /* --- Header -------------------------------------------------------- */
        .header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin: -4px -4px 0;
            padding: 4px 4px 0;
            border-radius: 8px;
            cursor: default;
        }
        /* The header drags the whole OS window, but only in edit mode (unlocked);
           dragging is handled in JS so it can be clamped to the screen. */
        .header { cursor: default; }
        .editing .header { cursor: move; }

        .header-left { display: flex; align-items: flex-start; gap: 7px; min-width: 0; }
        .grip { font-size: 13px; color: rgba(255, 255, 255, 0.4); line-height: 1.1; margin-top: 1px; flex-shrink: 0; }
        .kicker {
            font-size: 9px;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.42);
            text-transform: uppercase;
        }
        .quest-title { font-size: 13.5px; font-weight: 600; line-height: 1.25; margin-top: 3px; }

        .header-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
        .lock-btn {
            font-size: 8px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-radius: 5px;
            padding: 3px 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.18s ease;
            flex-shrink: 0;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .editing .lock-btn { color: rgba(255, 255, 255, 0.78); border-color: rgba(255, 255, 255, 0.32); }
        .lock-btn:hover { background: rgba(255, 255, 255, 0.08); }

        .chevron-btn {
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
        }
        .chevron-btn:hover { background: rgba(255, 255, 255, 0.08); }

        .close-btn {
            cursor: pointer;
            padding: 3px 7px;
            border-radius: 6px;
            font-size: 12px;
            line-height: 1;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            transition: all 0.18s ease;
        }
        .close-btn:hover { background: rgba(232, 80, 80, 0.22); color: #fff; }
        /* Generic icon button (gear). */
        .icon-btn {
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.18s ease;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.85); }
        .icon-btn.active { background: rgba(255, 255, 255, 0.13); color: #fff; }
        .icon-btn svg { display: block; width: 14px; height: 14px; }

        /* The quest title doubles as the collapse toggle (replaces the separate
           chevron button); a small caret in front of it is the only affordance. */
        .quest-title { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .editing .quest-title { cursor: move; } /* header drag wins in edit mode */
        .title-caret {
            font-size: 11px;
            line-height: 1;
            color: rgba(255, 255, 255, 0.45);
            transition: transform 0.25s ease;
            flex-shrink: 0;
        }
        .collapsed .title-caret { transform: rotate(-90deg); }

        /* --- Settings view (hotkey rebinding) ------------------------------ */
        .settings-view { margin-top: 12px; }
        .settings-kicker { font-size: 8.5px; letter-spacing: 0.14em; color: rgba(255, 255, 255, 0.45); text-transform: uppercase; }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 9px 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .setting-row:last-child { border-bottom: none; }
        .setting-name { font-size: 12.5px; color: rgba(255, 255, 255, 0.9); }
        .combo {
            font-size: 10.5px;
            padding: 4px 9px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.18s ease;
        }
        .combo:hover { background: rgba(255, 255, 255, 0.1); }
        .combo.capturing {
            border-color: rgba(120, 180, 255, 0.7);
            color: #cfe2ff;
            animation: gt-pulse 1.6s ease-in-out infinite;
        }
        .settings-hint { font-size: 10px; color: rgba(255, 255, 255, 0.4); margin-top: 11px; line-height: 1.45; }
        .settings-error { font-size: 10.5px; color: #ffb4b4; margin-top: 8px; min-height: 1em; }

        /* --- "Now" card (always visible, even when collapsed) -------------- */
        .now-card {
            margin-top: 12px;
            padding: 11px 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .now-label { font-size: 8.5px; letter-spacing: 0.14em; color: rgba(255, 255, 255, 0.45); text-transform: uppercase; }
        .now-step { font-size: 15px; font-weight: 600; line-height: 1.3; margin-top: 5px; }
        .now-meta { font-size: 9.5px; color: rgba(255, 255, 255, 0.4); margin-top: 5px; letter-spacing: 0.02em; }

        .done-card {
            margin-top: 12px;
            padding: 14px 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
        }

        /* --- Collapsible section (progress + checklist) -------------------- */
        .collapsible {
            overflow: hidden;
            max-height: 600px;
            opacity: 1;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        .collapsed .collapsible { max-height: 0; opacity: 0; }

        /* --- Progress ------------------------------------------------------ */
        .progress-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 13px;
        }
        .progress-label { font-size: 9px; letter-spacing: 0.12em; color: rgba(255, 255, 255, 0.42); text-transform: uppercase; }
        .progress-count { font-size: 9.5px; color: rgba(255, 255, 255, 0.55); }
        .progress-track {
            height: 4px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin-top: 6px;
        }
        .progress-fill {
            height: 100%;
            background: rgba(236, 237, 240, 0.88);
            border-radius: 3px;
            transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Checklist (height is user-resizable in edit mode) ------------- */
        .checklist {
            overflow-y: auto;
            margin-top: 8px;
            margin-right: -4px;
            padding-right: 4px;
        }
        .row {
            display: flex;
            gap: 9px;
            align-items: flex-start;
            padding: 7px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.18s ease;
        }
        .row.current { background: rgba(255, 255, 255, 0.07); }
        .row:hover { background: rgba(255, 255, 255, 0.1); }

        .mark {
            width: 16px;
            height: 16px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
            transition: all 0.2s ease;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
        }
        .row.current .mark { border-color: rgba(255, 255, 255, 0.7); animation: gt-pulse 2.4s ease-in-out infinite; }
        .row.done .mark { background: rgba(236, 237, 240, 0.92); border-color: transparent; animation: none; }
        .mark .check { font-size: 10px; color: #0d1014; font-weight: 700; line-height: 1; }

        .row-main { flex: 1; min-width: 0; }
        .row-label { font-size: 13px; font-weight: 500; line-height: 1.3; color: rgba(255, 255, 255, 0.92); }
        .row.done .row-label { font-weight: 400; color: rgba(255, 255, 255, 0.42); text-decoration: line-through; }
        .row-meta { font-size: 9px; color: rgba(255, 255, 255, 0.36); margin-top: 2px; letter-spacing: 0.02em; }

        /* --- Hint footer (per-step; hidden when the current step has none) - */
        .hint {
            margin-top: 11px;
            padding-top: 11px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 9px;
            align-items: flex-start;
        }
        .hint-label { font-size: 8.5px; letter-spacing: 0.12em; color: rgba(255, 255, 255, 0.45); text-transform: uppercase; margin-top: 2px; flex-shrink: 0; }
        .hint-text { flex: 1; font-size: 11.5px; color: rgba(255, 255, 255, 0.62); line-height: 1.45; }

        /* --- Resize handle (edit mode) — diagonal: width + list height ----- */
        /* Bottom-left handle: dragging out (left/down) grows the panel; the
           window keeps its top-right corner fixed (see App.FitWindow). */
        .resize-handle {
            position: absolute;
            left: 3px;
            bottom: 3px;
            width: 14px;
            height: 14px;
            cursor: nesw-resize;
            border-left: 2px solid rgba(255, 255, 255, 0.5);
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            border-bottom-left-radius: 4px;
            display: none;
        }
        .editing .resize-handle { display: block; }

        @keyframes gt-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.20); }
            50% { box-shadow: 0 0 0 4px rgba(255, 255, 255, 0); }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.14); border-radius: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body>
    <div class="mover" id="mover">
        <div class="panel" id="panel"></div>
        <div class="resize-handle" id="resize"></div>
    </div>

    <script>
    // ===================================================================
    // GoThrough HUD — wired to the real Wails backend (overlay.App).
    //
    // Step data lives in Go (the engine is the source of truth). The HUD:
    //   - loads meta + steps + current position via window.go.overlay.App
    //   - reflects global-hotkey changes via the "step:changed" runtime event
    //   - jumps to a step on row click via App.Goto(index)
    // Only layout prefs (position/size/lock/collapse) live in localStorage;
    // step progress is owned by the backend.
    // ===================================================================

    const App = window.go.overlay.App;

    // --- State (data from backend; layout prefs from localStorage) -----------
    // Bumped when the layout model changes so stale prefs are discarded.
    const STORE_KEY = "gt-overlay-v3";
    const saved = (() => { try { return JSON.parse(localStorage.getItem(STORE_KEY) || "{}"); } catch { return {}; } })();
    const DEFAULT_W = 312; // matches the initial corner window (340) minus margins
    const state = {
        meta: { game: "", title: "" },
        steps: [],            // [{title, description, current, total, isFirst, isLast}]
        activePos: 1,         // 1-based index of the current step
        view: "steps",        // "steps" | "settings"
        settings: null,       // {version, hotkeys:{next,prev,toggleHide,quit}} from App.Settings()
        capturing: null,      // hotkey action currently awaiting a keypress, or null
        settingsError: "",    // last rebind error message
        collapsed: false,
        locked: saved.locked ?? true,
        width: saved.width || DEFAULT_W,
        // listHeight is the checklist's reserved height. null = derive from the
        // natural content height on first render; that baseline becomes listMin,
        // the smallest you can shrink to. Growing past it adds scroll room.
        listHeight: saved.listHeight ?? null,
        listMin: saved.listMin ?? null,
    };

    // Current size is the minimum; you can drag larger (not smaller).
    const MIN_W = DEFAULT_W, MAX_W = 680;
    const EXTRA_H = 560; // how much taller than the baseline you may drag

    const mover = document.getElementById("mover");
    const panel = document.getElementById("panel");
    const resizeHandle = document.getElementById("resize");

    function save() {
        try {
            localStorage.setItem(STORE_KEY, JSON.stringify({
                locked: state.locked, width: state.width,
                listHeight: state.listHeight, listMin: state.listMin,
            }));
        } catch {}
    }

    function esc(s) {
        return String(s ?? "").replace(/[&<>"]/g,
            c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    // --- Hotkeys -------------------------------------------------------------
    // The settings panel rebinds these four global actions; the names/order
    // mirror settings.Hotkeys (settings/settings.go).
    const HOTKEY_ACTIONS = [
        { key: "next",       label: "Nächster Schritt" },
        { key: "prev",       label: "Vorheriger Schritt" },
        { key: "toggleHide", label: "Overlay ein/aus" },
        { key: "quit",       label: "Overlay schließen" },
    ];

    // formatBinding renders a stored binding for display. A binding triggers on
    // either a keyboard key OR a mouse button:
    //   {mods:["ctrl","alt"], key:"right"}     → "Ctrl + Alt + →"
    //   {mods:["ctrl","alt"], button:"middle"} → "Ctrl + Alt + Maus M"
    const MOD_LABEL = { ctrl: "Ctrl", alt: "Alt", shift: "Shift", win: "Win" };
    const KEY_LABEL = { left: "←", right: "→", up: "↑", down: "↓", space: "Space", return: "Enter", escape: "Esc", delete: "Del", tab: "Tab" };
    const BUTTON_LABEL = { left: "Maus L", middle: "Maus M", right: "Maus R", back: "Maus 4", x1: "Maus 4", forward: "Maus 5", x2: "Maus 5" };
    function formatBinding(b) {
        if (!b) return "—";
        let trigger;
        if (b.button) trigger = BUTTON_LABEL[b.button] || b.button;
        else if (b.key) trigger = KEY_LABEL[b.key] || b.key.toUpperCase();
        else return "—";
        const parts = (b.mods || []).map(m => MOD_LABEL[m] || m);
        parts.push(trigger);
        return parts.join(" + ");
    }

    // bindingFromKeyEvent turns a keydown into a stored keyboard binding, or null
    // if the event is just a bare modifier (wait for the real key) or an
    // unsupported key. Uses event.code so the physical key is captured
    // regardless of layout.
    function bindingFromKeyEvent(e) {
        if (["Control", "Alt", "Shift", "Meta"].includes(e.key)) return null;
        let key = null;
        const c = e.code;
        if (/^Key[A-Z]$/.test(c)) key = c.slice(3).toLowerCase();
        else if (/^Digit[0-9]$/.test(c)) key = c.slice(5);
        else if (/^F([1-9]|1[0-2])$/.test(c)) key = c.toLowerCase();
        else key = ({
            ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down",
            Space: "space", Enter: "return", Escape: "escape", Delete: "delete", Tab: "tab",
        })[c] || null;
        if (!key) return null;
        return { mods: modsFromEvent(e), key };
    }

    // bindingFromMouseEvent turns a mousedown into a stored mouse binding.
    // event.button: 0=left, 1=middle, 2=right, 3=back(X1), 4=forward(X2).
    function bindingFromMouseEvent(e) {
        const button = ({ 0: "left", 1: "middle", 2: "right", 3: "back", 4: "forward" })[e.button];
        if (!button) return null;
        return { mods: modsFromEvent(e), button };
    }

    // modsFromEvent reads the held modifiers off a key/mouse event.
    function modsFromEvent(e) {
        const mods = [];
        if (e.ctrlKey) mods.push("ctrl");
        if (e.altKey) mods.push("alt");
        if (e.shiftKey) mods.push("shift");
        if (e.metaKey) mods.push("win");
        return mods;
    }

    // --- Derived -------------------------------------------------------------
    function derive() {
        const total = state.steps.length;
        const doneCount = Math.max(0, state.activePos - 1);
        return { total, doneCount, pct: total ? Math.round(doneCount / total * 100) : 0 };
    }

    // --- Render --------------------------------------------------------------
    function render() {
        const { total, doneCount, pct } = derive();
        const current = state.steps[state.activePos - 1] || null;

        mover.classList.toggle("editing", !state.locked);
        mover.classList.toggle("collapsed", state.collapsed);

        const nowHTML = current
            ? `<div class="now-card">
                   <div class="now-label mono">Jetzt</div>
                   <div class="now-step">${esc(current.title)}</div>
                   <div class="now-meta mono">Schritt ${state.activePos} / ${total}</div>
               </div>`
            : `<div class="done-card">Keine Schritte geladen</div>`;

        const rowsHTML = state.steps.map((s, i) => {
            const pos = i + 1;
            const done = pos < state.activePos;
            const isCurrent = pos === state.activePos;
            return `
            <div class="row${done ? " done" : ""}${isCurrent ? " current" : ""}" data-index="${i}">
                <div class="mark">${done ? '<span class="check">✓</span>' : ""}</div>
                <div class="row-main">
                    <div class="row-label">${esc(s.title)}</div>
                </div>
            </div>`;
        }).join("");

        const hintHTML = (current && current.description)
            ? `<div class="hint">
                   <span class="hint-label mono">Hinweis</span>
                   <span class="hint-text">${esc(current.description)}</span>
               </div>`
            : "";

        const inSettings = state.view === "settings";

        // Settings body: one row per global action, each showing its current
        // combo as a button that captures a new keypress when clicked.
        const settingsHTML = `
            <div class="settings-view">
                <div class="settings-kicker mono">Tastenkürzel</div>
                ${HOTKEY_ACTIONS.map(a => {
                    const b = state.settings && state.settings.hotkeys[a.key];
                    const capturing = state.capturing === a.key;
                    return `<div class="setting-row">
                        <span class="setting-name">${esc(a.label)}</span>
                        <span class="combo mono${capturing ? " capturing" : ""}" data-action="${a.key}">${capturing ? "Taste/Maus drücken…" : esc(formatBinding(b))}</span>
                    </div>`;
                }).join("")}
                <div class="settings-error">${esc(state.settingsError)}</div>
                <div class="settings-hint">Klick auf ein Kürzel, dann Tasten- oder Maustasten-Kombination drücken. Esc bricht ab.</div>
            </div>`;

        panel.innerHTML = `
            <div class="header" id="header">
                <div class="header-left">
                    <div>
                        <div class="kicker mono">${esc(state.meta.game)}</div>
                        <div class="quest-title" id="questTitle">${esc(state.meta.title)}<span class="title-caret">⌄</span></div>
                    </div>
                </div>
                <div class="header-right">
                    <div class="lock-btn mono" id="lockBtn">${state.locked ? "Anpassen" : "Fixieren"}</div>
                    <div class="icon-btn${inSettings ? " active" : ""}" id="settings" title="Einstellungen">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </div>
                    <div class="close-btn" id="closeBtn" title="Overlay schließen">✕</div>
                </div>
            </div>
            ${inSettings ? settingsHTML : `
            ${nowHTML}
            <div class="collapsible">
                <div class="progress-row">
                    <span class="progress-label mono">Schritte</span>
                    <span class="progress-count mono">${doneCount} / ${total}</span>
                </div>
                <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
                <div class="checklist">${rowsHTML}</div>
            </div>
            ${hintHTML}`}`;

        applyLayout();
        wireEvents();
    }

    function applyLayout() {
        // The OS window is shrink-wrapped to the panel (see fitWindow), so the
        // panel is always pinned at the window's top-left.
        mover.style.left = "0px";
        mover.style.top = "0px";
        mover.style.width = state.width + "px";
        const cl = panel.querySelector(".checklist");
        if (cl) {
            if (state.listHeight == null) {
                // First render: take the natural content height as the baseline
                // (and minimum). The default look is unchanged; dragging the
                // handle down grows the list area beyond this.
                cl.style.height = "auto";
                const base = Math.ceil(cl.scrollHeight);
                state.listMin = state.listMin || base;
                state.listHeight = Math.max(base, state.listMin);
            }
            cl.style.height = state.listHeight + "px";
        }
    }

    // --- Interactions --------------------------------------------------------
    // Row click jumps the engine to that step; the returned StepInfo is the
    // new authoritative position.
    function gotoIndex(index) {
        App.Goto(index).then(info => { state.activePos = info.current; render(); });
    }

    function wireEvents() {
        document.getElementById("header").addEventListener("mousedown", startWindowDrag);
        const lockBtn = document.getElementById("lockBtn");
        lockBtn.addEventListener("mousedown", stopProp);
        lockBtn.addEventListener("click", toggleLock);
        // The title is the collapse toggle (no separate chevron button). A click
        // that isn't a window-drag toggles the checklist; harmless in the
        // settings view (nothing to collapse there).
        const title = document.getElementById("questTitle");
        title.addEventListener("click", () => { state.collapsed = !state.collapsed; render(); });
        const settingsBtn = document.getElementById("settings");
        settingsBtn.addEventListener("mousedown", stopProp);
        settingsBtn.addEventListener("click", toggleSettings);
        const closeBtn = document.getElementById("closeBtn");
        closeBtn.addEventListener("mousedown", stopProp);
        closeBtn.addEventListener("click", () => { window.runtime?.Quit?.(); });
        panel.querySelectorAll(".row").forEach(row =>
            row.addEventListener("click", () => gotoIndex(Number(row.dataset.index))));
        panel.querySelectorAll(".combo").forEach(combo => {
            combo.addEventListener("mousedown", stopProp);
            combo.addEventListener("click", () => startCapture(combo.dataset.action));
        });
    }

    // --- Settings panel + hotkey rebinding -----------------------------------
    function toggleSettings() {
        state.view = state.view === "settings" ? "steps" : "settings";
        state.capturing = null;
        state.settingsError = "";
        render();
    }

    // startCapture arms the next key/mouse press to rebind `action`. The actual
    // capture happens in the global listeners below.
    function startCapture(action) {
        state.capturing = action;
        state.settingsError = "";
        render();
    }

    // applyCapturedBinding persists a captured binding via App.SaveHotkeys (which
    // validates + re-registers in the real build) and adopts the returned
    // settings, or shows the validation error.
    function applyCapturedBinding(binding) {
        const action = state.capturing;
        const hotkeys = { ...state.settings.hotkeys, [action]: binding };
        window.go.overlay.App.SaveHotkeys(hotkeys).then(saved => {
            state.settings = saved;
            state.capturing = null;
            state.settingsError = "";
            render();
        }).catch(err => {
            state.capturing = null;
            state.settingsError = String(err && err.message ? err.message : err);
            render();
        });
    }

    // While capturing, the next usable keydown becomes the new binding. Esc cancels.
    function onCaptureKeydown(e) {
        if (!state.capturing) return;
        e.preventDefault();
        e.stopPropagation();
        if (e.key === "Escape") { state.capturing = null; render(); return; }
        const binding = bindingFromKeyEvent(e);
        if (!binding) return; // bare modifier or unsupported key — keep waiting
        applyCapturedBinding(binding);
    }

    // While capturing, a mousedown binds that mouse button (+ held modifiers).
    function onCaptureMousedown(e) {
        if (!state.capturing) return;
        e.preventDefault();
        e.stopPropagation();
        const binding = bindingFromMouseEvent(e);
        if (!binding) return; // unsupported button — keep waiting
        applyCapturedBinding(binding);
    }

    // Capture phase so we intercept before the step-navigation keys / UI clicks.
    window.addEventListener("keydown", onCaptureKeydown, true);
    window.addEventListener("mousedown", onCaptureMousedown, true);
    // Suppress the context menu while binding a right-click.
    window.addEventListener("contextmenu", e => { if (state.capturing) e.preventDefault(); }, true);

    function toggleLock() {
        state.locked = !state.locked;
        save();
        render();
    }

    function stopProp(e) { e.stopPropagation(); }

    // --- Resize (edit mode): panel width + checklist height ------------------
    // The window is shrink-wrapped to the panel (see fitWindow); resizing the
    // panel resizes the window, keeping its top-right corner fixed.
    let drag = null;

    function startResize(e) {
        if (state.locked) return;
        e.preventDefault();
        e.stopPropagation();
        // Use absolute screen coords: the window repositions during resize, so
        // webview-relative clientX/Y would drift.
        drag = { sx: e.screenX, sy: e.screenY, ow: state.width, oh: state.listHeight };
        mover.classList.add("dragging");
    }

    function onMove(e) {
        if (!drag) return;
        // Bottom-left handle: drag left → wider, drag down → taller.
        state.width = Math.max(MIN_W, Math.min(drag.ow - (e.screenX - drag.sx), MAX_W));
        const minH = state.listMin || 0;
        state.listHeight = Math.max(minH, Math.min(drag.oh + (e.screenY - drag.sy), minH + EXTRA_H));
        applyLayout();
    }

    function onUp() {
        if (drag) { drag = null; mover.classList.remove("dragging"); save(); }
    }

    resizeHandle.addEventListener("mousedown", startResize);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);

    // --- Move the whole OS window (header drag, edit mode only) ---------------
    // Custom (not Wails' --wails-draggable) so it can be gated on the lock state
    // and clamped to the screen bounds. Window pos/size and the screen size are
    // fetched once on mousedown; moves are then computed from absolute screen
    // mouse coords.
    let winDrag = null;

    async function startWindowDrag(e) {
        if (state.locked || e.button !== 0) return;
        if (e.target.closest(".lock-btn, .icon-btn, .close-btn")) return;
        const rt = window.runtime;
        if (!rt || !rt.WindowGetPosition) return; // e.g. devui (no OS window)
        e.preventDefault();
        const [pos, size, screens] = await Promise.all([
            rt.WindowGetPosition(), rt.WindowGetSize(), rt.ScreenGetAll(),
        ]);
        const scr = (screens || []).find(s => s.isPrimary) || (screens || [])[0];
        const sw = scr ? (scr.size?.width || scr.width) : Infinity;
        const sh = scr ? (scr.size?.height || scr.height) : Infinity;
        winDrag = {
            sx: e.screenX, sy: e.screenY, ox: pos.x, oy: pos.y,
            maxX: isFinite(sw) ? Math.max(0, sw - size.w) : Infinity,
            maxY: isFinite(sh) ? Math.max(0, sh - size.h) : Infinity,
        };
    }

    function onWinMove(e) {
        if (!winDrag) return;
        const nx = Math.max(0, Math.min(winDrag.ox + (e.screenX - winDrag.sx), winDrag.maxX));
        const ny = Math.max(0, Math.min(winDrag.oy + (e.screenY - winDrag.sy), winDrag.maxY));
        window.runtime.WindowSetPosition(Math.round(nx), Math.round(ny));
    }

    function onWinUp() { winDrag = null; }

    window.addEventListener("mousemove", onWinMove);
    window.addEventListener("mouseup", onWinUp);

    // --- Shrink-wrap the OS window to the panel ------------------------------
    // Confines the translucent window backdrop to the panel itself (no frame
    // around it) and removes the click-dead-zone. Fires on every panel size
    // change: content, collapse/expand animation, font load, manual resize.
    function fitWindow() {
        const r = panel.getBoundingClientRect();
        const w = Math.ceil(r.width), h = Math.ceil(r.height);
        if (w > 0 && h > 0) window.go?.overlay?.App?.FitWindow?.(w, h);
    }
    new ResizeObserver(fitWindow).observe(panel);

    // --- Boot ----------------------------------------------------------------
    async function init() {
        try {
            const [meta, steps, current, settings] = await Promise.all([
                App.Meta(), App.Steps(), App.CurrentStep(), App.Settings(),
            ]);
            state.meta = meta;
            state.steps = steps;
            state.activePos = current.current;
            state.settings = settings;
        } catch (e) {
            console.error("[GoThrough] failed to load walkthrough from backend:", e);
        }
        render();

        // Global-hotkey-driven step changes arrive as events from Go.
        if (window.runtime && window.runtime.EventsOn) {
            window.runtime.EventsOn("step:changed", info => {
                state.activePos = info.current;
                render();
            });
        }
    }
    init();
    </script>
</body>
</html>
