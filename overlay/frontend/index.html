<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <style>
        :root {
            --glass: rgba(10, 12, 24, 0.78);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e8eaf6;
            --muted: rgba(255, 255, 255, 0.45);
            --accent: rgba(99, 102, 241, 0.55);
            --accent-hover: rgba(99, 102, 241, 0.80);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--glass);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            user-select: none;
            overflow: hidden;
        }

        .topbar {
            --wails-draggable: drag;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .progress {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .close-btn {
            --wails-draggable: no-drag;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            border: none;
            cursor: pointer;
            color: var(--muted);
            font-size: 9px;
            line-height: 16px;
            text-align: center;
            transition: background 0.15s, color 0.15s;
        }
        .close-btn:hover { background: rgba(255, 70, 70, 0.65); color: #fff; }

        .step-title {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .step-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.55;
            flex: 1;
        }

        .buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        button {
            flex: 1;
            padding: 6px 0;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }
        button:hover:not(:disabled) { background: rgba(255, 255, 255, 0.16); }
        button:disabled { opacity: 0.3; cursor: default; }

        #btn-next {
            background: var(--accent);
            border-color: rgba(99, 102, 241, 0.6);
        }
        #btn-next:hover:not(:disabled) { background: var(--accent-hover); }
    </style>
</head>
<body>
    <div class="topbar">
        <span class="progress" id="progress">Step 1 / 1</span>
        <button class="close-btn" onclick="quit()">✕</button>
    </div>
    <div class="step-title" id="title"></div>
    <div class="step-desc" id="desc"></div>
    <div class="buttons">
        <button id="btn-prev" onclick="prevStep()">← Prev</button>
        <button id="btn-next" onclick="nextStep()">Next →</button>
    </div>

    <script>
        function render(s) {
            document.getElementById('progress').textContent = `Step ${s.current} / ${s.total}`;
            document.getElementById('title').textContent = s.title;
            document.getElementById('desc').textContent = s.description;
            document.getElementById('btn-prev').disabled = s.isFirst;
            document.getElementById('btn-next').textContent = s.isLast ? 'Finish ✓' : 'Next →';
        }

        function nextStep() {
            if (document.getElementById('btn-next').textContent.startsWith('Finish')) {
                window.runtime.Quit();
                return;
            }
            window.go.overlay.App.Next().then(render);
        }

        function prevStep() {
            window.go.overlay.App.Prev().then(render);
        }

        function quit() {
            window.runtime.Quit();
        }

        window.addEventListener('load', () => {
            window.go.overlay.App.CurrentStep().then(render);
        });
    </script>
</body>
</html>
