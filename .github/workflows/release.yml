name: Release

# Builds the Wails app on native runners (the overlay is CGo + WebView2/webkit,
# so it can't be cross-compiled) and attaches a Windows and a Linux binary to the
# GitHub release for the pushed tag. Triggered by pushing a v* tag.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: GoThrough-windows-amd64.exe
            built: GoThrough.exe
            flags: '-upx'
          - os: ubuntu-latest
            artifact: GoThrough-linux-amd64
            built: GoThrough
            flags: '-upx -tags webkit2_41' # modern Ubuntu ships webkit2gtk-4.1
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev upx-ucl xvfb

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx --no-progress -y

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            Xvfb :99 -screen 0 1024x768x24 &
            export DISPLAY=:99.0
          fi
          wails build -s ${{ matrix.flags }}

      # Sign the Windows binary if a code-signing certificate is available.
      # Store the PFX as a base64-encoded secret SIGNING_KEY_B64 and its
      # password as SIGNING_PASSWORD. Without these secrets the step is skipped
      # and the binary ships unsigned (SmartScreen will warn on first run).
      # Recommended: obtain a certificate via https://signpath.io (free for OSS)
      # or an OV/EV certificate from a trusted CA.
      - name: Sign (Windows)
        if: runner.os == 'Windows' && env.SIGNING_KEY_B64 != ''
        shell: powershell
        env:
          SIGNING_KEY_B64: ${{ secrets.SIGNING_KEY_B64 }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:SIGNING_KEY_B64)
          [IO.File]::WriteAllBytes("cert.pfx", $pfxBytes)
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue | Select-Object -Last 1).FullName
          if (-not $signtool) { Write-Error "signtool.exe not found"; exit 1 }
          & $signtool sign /fd sha256 /tr http://timestamp.digicert.com /td sha256 /f cert.pfx /p $env:SIGNING_PASSWORD "build/bin/GoThrough.exe"
          Remove-Item cert.pfx

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "build/bin/${{ matrix.built }}" "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.ref_name }}"
          # Create the release if it doesn't exist yet (no-op if it does).
          gh release create "$TAG" --title "$TAG" --generate-notes || echo "release already exists"
          gh release upload "$TAG" dist/* --clobber
